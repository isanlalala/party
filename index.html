<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Pro: Teams & Seats</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #c084fc; --bg: #faf5ff; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .container.fullscreen { max-width: 100%; padding: 0; border-radius: 0; box-shadow: none; height: 100vh; background: #000; }
        h1, h2 { text-align: center; color: #9333ea; }
        .section { margin-bottom: 30px; border-bottom: 1px solid #ede9fe; padding-bottom: 20px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0; }
        button { padding: 10px 16px; border: none; border-radius: 6px; background: var(--primary); color: white; cursor: pointer; transition: 0.2s; font-weight: 600; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.secondary { background: #a78bfa; }
        button.win-btn { background: #22c55e; width: 100%; margin-top: 10px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 80px; text-align: center; }
        .display-box { background: #f3e8ff; padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; min-height: 50px; }
        .dashboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .dashboard-table th, .dashboard-table td { border: 1px solid #ede9fe; padding: 8px; text-align: left; }
        .hidden { display: none; }

		/* Word Display Container */
		#word-display {
			transition: background-color 0.2s ease;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			text-align: center;
		}

		/* Typography for Big TV */
		.display-word { font-size: 3.5rem; font-weight: 800; margin: 0; }
		.display-translation { font-size: 1.5rem; opacity: 0.8; margin-top: 5px; }
		.display-category { font-size: 0.9rem; text-transform: uppercase; margin-top: 20px; opacity: 0.6; font-weight: bold; }

		/* Fullscreen Big TV Mode */
		.container.fullscreen #game-active {
			display: flex !important;
			flex-direction: column;
			height: 100%;
			justify-content: space-between;
			padding: 20px;
			background: #000;
			color: white;
		}

		.container.fullscreen #word-display {
			flex: 1;
			font-size: 4rem;
			margin: 40px 0;
			color: white;
			background: #000;
		}

		.container.fullscreen .display-word {
			font-size: 7rem;
			line-height: 1;
			margin-bottom: 20px;
			color: white;
		}

		.container.fullscreen .display-translation {
			font-size: 3rem;
			margin: 20px 0;
			color: white;
		}

		.container.fullscreen .display-category {
			font-size: 1.5rem;
			margin-top: 40px;
			color: rgba(255, 255, 255, 0.7);
		}

		.container.fullscreen .game-controls {
			display: flex;
			gap: 20px;
			padding: 20px 0;
			justify-content: center;
		}

		.container.fullscreen .game-controls button {
			padding: 20px 40px;
			font-size: 1.5rem;
			min-width: 200px;
		}

		.container.fullscreen #game-lobby {
			color: white;
			background: #000;
			padding: 30px;
		}

		.container.fullscreen #game-lobby label {
			color: white;
		}

		.container.fullscreen #category-checklist {
			background: #1a1a1a !important;
			border-color: #666 !important;
			color: white;
		}

		.container.fullscreen #category-checklist label {
			color: white !important;
		}

		.container.fullscreen #category-checklist input[type="checkbox"] {
			cursor: pointer;
		}

		.container.fullscreen #category-items label {
			color: white !important;
		}

		.container.fullscreen #game-lobby button {
			padding: 20px 40px;
			font-size: 1.2rem;
		}

		.container.fullscreen .game-header {
			color: white;
			font-size: 1.3rem;
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
			background: #000;
		}

		.container.fullscreen .game-header span {
			font-size: 2rem;
			font-weight: bold;
			color: white;
		}

		/* Welcome Screen */
		#welcome-screen {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			height: 100%;
			gap: 40px;
		}

		#welcome-screen h1 {
			font-size: 3rem;
			color: #db2777;
		}

		#welcome-screen .welcome-buttons {
			display: flex;
			flex-direction: column;
			gap: 20px;
			width: 100%;
		}

		#welcome-screen button {
			padding: 20px 30px;
			font-size: 1.2rem;
			width: 100%;
			border-radius: 10px;
		}

		#welcome-screen .bigtv-btn {
			background: #a78bfa;
			font-size: 1.3rem;
		}

		#welcome-screen .team-btn {
			background: #c084fc;
		}

		/* The Success Flash */
		.flash-green {
			background-color: #22c55e !important;
		}

		/* Back button */
		.back-btn {
			position: absolute;
			top: 20px;
			left: 20px;
			background: rgba(255,255,255,0.2);
			color: white;
			padding: 10px 15px;
			border-radius: 6px;
		}

		.container.fullscreen .back-btn {
			color: white;
			background: rgba(255,255,255,0.15);
		}

    </style>
</head>
<body>

<div class="container" id="main-container">
    <!-- Welcome Screen -->
    <div id="welcome-screen" style="display: none;">
        <h1>🍶🪓殺紅了眼⚡🍑</h1>
        <div class="welcome-buttons">
            <button class="bigtv-btn" onclick="startBigTVMode()">📺 大電視 (Big Screen)</button>
            <button class="team-btn" onclick="startTeamMode()">⚔️ Team Assignment</button>
        </div>
    </div>

    <!-- Regular Navigation (hidden in fullscreen mode) -->
    <div id="nav-bar" class="btn-group" style="margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
        <button class="secondary" onclick="showView('setup')">🏠 Assignment</button>
        <button style="background: #c084fc; color: white;" onclick="showView('bigtv')">📺 大電視</button>
        <button class="secondary" onclick="showStatsPage()">📊 Stats</button>
    </div>

    <div id="view-setup" class="view">
        <div class="section">
            <h2>🪑 Quick Seat Draw</h2>
            <div class="btn-group">
                <button class="secondary" onclick="initSeatDraw(2)">2</button>
                <button class="secondary" onclick="initSeatDraw(3)">3</button>
                <button class="secondary" onclick="initSeatDraw(4)">4</button>
                <button class="secondary" onclick="initSeatDraw(5)">5</button>
                <button class="secondary" onclick="initSeatDraw(6)">6</button>
                <button class="secondary" onclick="initSeatDraw(7)">7</button>
                <button class="secondary" onclick="initSeatDraw(8)">8</button>
                <button class="secondary" onclick="initSeatDraw(9)">9</button>
                <button class="secondary" onclick="initSeatDraw(10)">10</button>
            </div>
            
            <div id="seatActionArea" class="hidden" style="text-align: center; margin-top: 15px;">
                <button onclick="drawNextSeat()" id="drawBtn">What's my seat?</button>
                <div class="display-box" id="seatDisplay">Select players above</div>
            </div>
        </div>

        <div class="section">
            <h2>⚔️ Team Assignment</h2>
            <div id="setupForm">
                <label>
                    <input type="checkbox" id="useDefault" checked onchange="togglePlayerInputs()"> 組織 Players
                </label>

                <div id="customPlayerSetup" class="hidden" style="margin-top: 15px; background: #f1f5f9; padding: 15px; border-radius: 8px;">
                    <label>How many players? </label>
                    <input type="number" id="playerCount" value="5" min="2" max="20" onchange="generateNameInputs()" style="width: 50px;">
                    <div id="nameInputsArea" style="margin-top: 10px;"></div>
                </div>

                <div class="btn-group" style="margin-top: 15px;">
                    <button onclick="assignTeams()" style="width: 100%;">Assign Teams & Seats</button>
                </div>
            </div>

            <div id="teamResult" class="display-box hidden"></div>
            
            <div id="winButtons" class="hidden" style="margin-top: 10px;">
                <button class="win-btn" onclick="recordWin(1)">Team 1 Won!</button>
                <button class="win-btn" onclick="recordWin(2)">Team 2 Won!</button>
            </div>
        </div>
    </div>

    <div id="view-bigtv" class="view hidden">
        <div class="section" style="text-align: center;">
            <h2 style="color: #a855f7;">📺 大電視</h2>
            
            <div id="game-lobby">
                <div style="background: #f3e8ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd6fe; text-align: left;">

                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">📁 Select Categories:</label>
                    <div id="category-checklist" style="max-height: 150px; overflow-y: auto; background: white; border: 1px solid #c084fc; border-radius: 5px; padding: 10px; margin-bottom: 15px;">
					<label style="display: block; font-weight: bold; cursor: pointer;">
						<input type="checkbox" id="check-all" onchange="toggleAllCats(this.checked)" checked> (Select / Deselect All)
					</label>
					<hr style="margin: 8px 0; border: 0; border-top: 1px solid #eee;">
					<div id="category-items">
						</div>
					</div>

                    <div>
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">⏱️ Play Time:</label>
                        <div class="btn-group">
                            <button class="secondary time-opt" onclick="setTime(10)" id="t10">10s</button>
                            <button class="secondary time-opt" onclick="setTime(90)" id="t90">90s</button>
                            <button class="secondary time-opt" onclick="setTime(120)" id="t120">120s</button>
							<button class="secondary time-opt" onclick="setTime(300)" id="t300">300s</button>
							<button class="secondary time-opt" onclick="setTime(600)" id="t600">600s</button>
                        </div>
                    </div>
                </div>
                <button onclick="startBigTV()" style="font-size: 1.2em; padding: 15px 30px; background: #a855f7; width: 100%;">START GAME</button>
            </div>

            <div id="game-active" class="hidden">
                <button class="back-btn" onclick="exitBigTV()">← Back to Menu</button>
                <div class="game-header">
                    <div>⏱️ <span id="timer">60</span>s</div>
                    <div>Score: <span id="score">0</span></div>
                    <button onclick="endGame(true)" style="background: #ef4444; padding: 8px 15px; font-size: 0.9em;">Stop Game</button>
                </div>
                <div id="word-display">LOADING...</div>
                <div class="game-controls">
                    <button onclick="nextWord(false)" style="background:#64748b; flex:1;">SKIP ⊘</button>
                    <button onclick="nextWord(true)" style="background:#22c55e; flex:2;">CORRECT ✅</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-stats" class="view hidden">
        <div class="section" style="margin-bottom: 0;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">📊 Stats & History</h2>
                <button class="secondary" onclick="showView('setup')" style="padding: 8px 12px; font-size: 0.9em;">← Back</button>
            </div>

            <div style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 10px;">📅 Filter by Month:</label>
                <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                    <button class="secondary" onclick="loadStatsForMonth(null)" id="btn-all" style="flex: 1;">All Time</button>
                    <input type="month" id="month-picker" style="flex: 1; padding: 8px;" onchange="loadStatsForMonth(document.getElementById('month-picker').value)">
                </div>
                <button onclick="resetDateFilter()" class="secondary" style="width: 100%; padding: 8px;">Clear Filter</button>
            </div>

            <div id="statsContent" style="min-height: 300px;">
                <p style="text-align: center; color: #64748b;">⌛ Loading stats...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 0. FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyB3BhgYIyDCTHsF6ZXU1Y35BAhWDGJgwF4",
        authDomain: "party-8c722.firebaseapp.com",
        projectId: "party-8c722",
        storageBucket: "party-8c722.firebasestorage.app",
        messagingSenderId: "848163286246",
        appId: "1:848163286246:web:d7f811ee2664dacfcf9f27",
        measurementId: "G-V7WJLYJT70"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
	
	// --- NAVIGATION LOGIC ---
    window.showView = function(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + viewName).classList.remove('hidden');
        document.getElementById('dashboard').classList.add('hidden'); // Hide stats when switching
    };

	// --- MODE SELECTION ---
	window.startBigTVMode = function() {
		document.getElementById('welcome-screen').style.display = 'none';
		document.getElementById('nav-bar').style.display = 'none';
		document.getElementById('main-container').classList.add('fullscreen');
		document.body.style.padding = '0';
		document.body.style.background = '#000';
		showView('bigtv');
		// Check if words are loaded, if not load them
		if (gameWords.length === 0) {
			loadWords().then(() => {
				document.getElementById('game-lobby').style.display = 'flex';
				document.getElementById('game-lobby').style.flexDirection = 'column';
				document.getElementById('game-lobby').style.justifyContent = 'center';
				document.getElementById('game-lobby').style.alignItems = 'center';
				document.getElementById('game-lobby').style.height = '100%';
			});
		} else {
			document.getElementById('game-lobby').style.display = 'flex';
			document.getElementById('game-lobby').style.flexDirection = 'column';
			document.getElementById('game-lobby').style.justifyContent = 'center';
			document.getElementById('game-lobby').style.alignItems = 'center';
			document.getElementById('game-lobby').style.height = '100%';
		}
	};

	window.startTeamMode = function() {
		document.getElementById('welcome-screen').style.display = 'none';
		document.getElementById('nav-bar').style.display = 'flex';
		document.getElementById('main-container').classList.remove('fullscreen');
		document.body.style.padding = '20px';
		document.body.style.background = 'var(--bg)';
		showView('setup');
	};

	window.exitBigTV = function() {
		clearInterval(gameInterval);
		document.getElementById('main-container').classList.remove('fullscreen');
		document.body.style.padding = '20px';
		document.body.style.background = 'var(--bg)';
		document.getElementById('welcome-screen').style.display = 'flex';
		document.getElementById('nav-bar').style.display = 'flex';
		document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
	};

	// --- STATS PAGE FUNCTIONS ---
	let allStatsData = [];

	window.showStatsPage = function() {
		showView('stats');
		// Add small delay to ensure DOM is ready
		setTimeout(() => {
			loadAllStats();
		}, 100);
	};

	window.loadAllStats = async function() {
		try {
			const contentArea = document.getElementById('statsContent');
			if (!contentArea) {
				console.error("statsContent element not found");
				return;
			}

			contentArea.innerHTML = "⌛ Loading stats...";

			// Add timeout to prevent infinite loading
			const timeoutPromise = new Promise((_, reject) =>
				setTimeout(() => reject(new Error("Loading timeout")), 10000)
			);

			const queryPromise = db.collection("daily_stats").get();
			const snapshot = await Promise.race([queryPromise, timeoutPromise]);

			allStatsData = [];
			snapshot.forEach(doc => {
				allStatsData.push({ id: doc.id, data: doc.data() });
			});

			allStatsData.sort((a, b) => b.id.localeCompare(a.id));
			displayStats(allStatsData, false); // false = show only overall stats
			document.getElementById('month-picker').value = '';
		} catch (e) {
			console.error("Load stats error:", e);
			document.getElementById('statsContent').innerHTML = "<p style='text-align: center; color: #ef4444;'><strong>Error loading stats:</strong><br>" + e.message + "<br><br>Check browser console for details.</p>";
		}
	};

	window.loadStatsForMonth = async function(monthStr) {
		if (!monthStr) {
			loadAllStats();
			return;
		}
		// Filter stats by month (format: YYYY-MM)
		const filtered = allStatsData.filter(item => item.id.startsWith(monthStr));
		if (filtered.length === 0) {
			document.getElementById('statsContent').innerHTML = `<p style="text-align: center; color: #64748b;">No stats found for ${monthStr}</p>`;
		} else {
			displayStats(filtered, true); // Show daily breakdown when filtering by month
		}
	};

	window.resetDateFilter = function() {
		document.getElementById('month-picker').value = '';
		loadAllStats();
	};

	function displayStats(statsArray, showDaily = false) {
		if (statsArray.length === 0) {
			document.getElementById('statsContent').innerHTML = "<p style='text-align:center; color: #64748b;'>No games recorded yet.</p>";
			return;
		}

		// Calculate overall stats across all dates
		const overallStats = {};
		statsArray.forEach(item => {
			const playersMap = item.data;
			for (const playerName in playersMap) {
				const stats = playersMap[playerName];
				const pName = playerName.toLowerCase();
				if (!overallStats[pName]) {
					overallStats[pName] = { displayName: playerName, wins: 0, total: 0 };
				}
				overallStats[pName].wins += stats.wins || 0;
				overallStats[pName].total += stats.total || 0;
			}
		});

		let fullHtml = "";

		// Overall stats section
		let overallMaxRate = -1;
		for (const name in overallStats) {
			const stats = overallStats[name];
			const rate = stats.total > 0 ? (stats.wins / stats.total) : 0;
			if (rate > overallMaxRate) overallMaxRate = rate;
		}

		let overallTableRows = "";
		const overallPlayers = Object.values(overallStats).sort((a, b) => b.total - a.total);
		overallPlayers.forEach(player => {
			const w = player.wins || 0;
			const t = player.total || 0;
			const currentRate = t > 0 ? (w / t) : 0;
			const displayRate = Math.round(currentRate * 100);
			const isOverallMVP = (currentRate === overallMaxRate && w > 0);
			const crown = isOverallMVP ? " 👑" : "";
			let color = displayRate >= 60 ? "#22c55e" : (displayRate <= 40 && t > 0 ? "#ef4444" : "#64748b");
			overallTableRows += `<tr style="${isOverallMVP ? 'background: rgba(255, 215, 0, 0.1);' : ''}">
				<td style="padding:12px; border-bottom:1px solid #eee;"><strong>${player.displayName.toUpperCase()}${crown}</strong></td>
				<td style="padding:12px; border-bottom:1px solid #eee; color:${color}; font-weight:800;">${displayRate}%</td>
				<td style="padding:12px; border-bottom:1px solid #eee;">${w}W - ${t-w}L <small>(${t})</small></td>
			</tr>`;
		});

		fullHtml += `<div style="margin-bottom:30px; border:2px solid #c084fc; border-radius:12px; background:linear-gradient(135deg, #c084fc 0%, #d8b4fe 100%); overflow:hidden;">
			<div style="background:rgba(0,0,0,0.1); color:white; padding:15px; font-weight:bold; font-size:1.2em;">🏆 Overall Stats</div>
			<div style="background:white;">
				<table style="width:100%; border-collapse:collapse; text-align:left;">
					<thead style="background:#f3e8ff;"><tr><th style="padding:10px;">Player</th><th style="padding:10px;">Rate</th><th style="padding:10px;">W/L</th></tr></thead>
					<tbody>${overallTableRows}</tbody>
				</table>
			</div>
		</div>`;

		// Daily stats section (only if showDaily is true)
		if (showDaily) {
			const sortedArray = [...statsArray].sort((a, b) => b.id.localeCompare(a.id));
			sortedArray.forEach(item => {
				const dateKey = item.id;
				const playersMap = item.data;
				let maxRate = -1;

				for (const name in playersMap) {
					const stats = playersMap[name];
					const rate = stats.total > 0 ? (stats.wins / stats.total) : 0;
					if (rate > maxRate) maxRate = rate;
				}

				let tableRows = "";
				for (const playerName in playersMap) {
					const stats = playersMap[playerName];
					const w = stats.wins || 0;
					const t = stats.total || 0;
					const currentRate = t > 0 ? (w / t) : 0;
					const displayRate = Math.round(currentRate * 100);
					const isMVP = (currentRate === maxRate && w > 0);
					const crown = isMVP ? " 👑" : "";
					let color = displayRate >= 60 ? "#22c55e" : (displayRate <= 40 && t > 0 ? "#ef4444" : "#64748b");
					tableRows += `<tr style="${isMVP ? 'background: rgba(255, 215, 0, 0.05);' : ''}">
						<td style="padding:12px; border-bottom:1px solid #eee;"><strong>${playerName.toUpperCase()}${crown}</strong></td>
						<td style="padding:12px; border-bottom:1px solid #eee; color:${color}; font-weight:800;">${displayRate}%</td>
						<td style="padding:12px; border-bottom:1px solid #eee;">${w}W - ${t-w}L <small>(${t})</small></td>
					</tr>`;
				}

				fullHtml += `<div style="margin-bottom:20px; border:1px solid #ede9fe; border-radius:12px; background:white; overflow:hidden;">
					<div style="background:#a855f7; color:white; padding:12px 15px; font-weight:bold; font-size:1.1em;">📅 ${dateKey}</div>
					<table style="width:100%; border-collapse:collapse; text-align:left;">
						<thead style="background:#f3e8ff;"><tr><th style="padding:10px;">Player</th><th style="padding:10px;">Rate</th><th style="padding:10px;">W/L</th></tr></thead>
						<tbody>${tableRows}</tbody>
					</table>
				</div>`;
			});
		}

		document.getElementById('statsContent').innerHTML = fullHtml;
	}

	// Show welcome screen on load
	window.addEventListener('load', () => {
		document.getElementById('welcome-screen').style.display = 'flex';
	});

    // --- 1. GLOBAL STATE ---
    let availableSeats = [];
    let totalSeatsSet = 0;
    let confirmedCount = 0;
    const defaultPlayers = ["I San🍭", "Ricky🐹", "Angela", "Lawrence", "Suzanne"];
    let currentTeams = { team1: [], team2: [] };

    // --- 2. SEAT DRAW LOGIC ---
    window.initSeatDraw = function(num) {
        if(!num || num < 1) return;
        totalSeatsSet = parseInt(num);
        confirmedCount = 0;
        availableSeats = Array.from({length: totalSeatsSet}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        
        document.getElementById('seatActionArea').classList.remove('hidden');
        document.getElementById('seatDisplay').innerText = `Ready to draw for ${num} players.`;
        document.getElementById('drawBtn').disabled = false;
    };

    window.drawNextSeat = function() {
        if(availableSeats.length > 0) {
            const seat = availableSeats.pop();
            confirmedCount++;
            document.getElementById('seatDisplay').innerHTML = `<strong>Your Seat: (${seat})</strong> <br> Confirmed: (${confirmedCount}/${totalSeatsSet})`;
            if(availableSeats.length === 0) {
                document.getElementById('drawBtn').disabled = true;
            }
        }
    };

    // --- 3. TEAM ASSIGNMENT LOGIC ---
    window.togglePlayerInputs = function() {
        const isDefault = document.getElementById('useDefault').checked;
        const customArea = document.getElementById('customPlayerSetup');
        if (customArea) {
            customArea.classList.toggle('hidden', isDefault);
            if (!isDefault) generateNameInputs();
        }
    };

    window.generateNameInputs = function() {
        const count = parseInt(document.getElementById('playerCount').value) || 5;
        const area = document.getElementById('nameInputsArea');
        area.innerHTML = "";
        const defaultNames = ["I San", "Ricky", "Angela", "Lawrence", "Suzanne"];
        
        area.style.display = "grid";
        area.style.gridTemplateColumns = "repeat(auto-fit, minmax(140px, 1fr))";
        area.style.gap = "10px";
        area.style.width = "100%";
        area.style.boxSizing = "border-box";

        for (let i = 1; i <= count; i++) {
            const defaultValue = defaultNames[i - 1] || "";
            area.innerHTML += `
                <div style="display: flex; flex-direction: column;">
                    <label style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Player ${i}</label>
                    <input type="text" class="player-name-input" value="${defaultValue}" placeholder="Name..." 
                           style="padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; width: 100%; box-sizing: border-box;">
                </div>`;
        }
    };

    window.assignTeams = function() {
        let players = [];
        const isDefault = document.getElementById('useDefault').checked;
        if (isDefault) {
            players = [...defaultPlayers];
        } else {
            const inputs = document.querySelectorAll('.player-name-input');
            inputs.forEach(input => {
                if (input.value.trim() !== "") players.push(input.value.trim());
            });
            if (players.length < 2) {
                alert("Please enter at least 2 player names!");
                return;
            }
        }
        players.sort(() => Math.random() - 0.5);
        const seats = Array.from({length: players.length}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        const mid = Math.ceil(players.length / 2);
        currentTeams.team1 = players.slice(0, mid).map(p => ({name: p, seat: seats.pop()}));
        currentTeams.team2 = players.slice(mid).map(p => ({name: p, seat: seats.pop()}));

        let html = "<strong>Team 1:</strong> " + currentTeams.team1.map(p => `${p.name}(${p.seat})`).join(", ") + "<br>";
        html += "<strong>Team 2:</strong> " + currentTeams.team2.map(p => `${p.name}(${p.seat})`).join(", ");
        document.getElementById('teamResult').innerHTML = html;
        document.getElementById('teamResult').classList.remove('hidden');
        document.getElementById('winButtons').classList.remove('hidden');
    };

    // --- 4. WIN RECORDING ---
    function getTodayString() {
        const d = new Date();
        return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
    }

    window.recordWin = async function(winningTeamNum) {
        try {
            const dateKey = getTodayString();
            const winners = winningTeamNum === 1 ? currentTeams.team1 : currentTeams.team2;
            const allPlayers = [...currentTeams.team1, ...currentTeams.team2];
            const dayRef = db.collection("daily_stats").doc(dateKey);
            const doc = await dayRef.get();
            let dayData = doc.exists ? doc.data() : {};

            allPlayers.forEach(p => {
                const pName = p.name.toLowerCase();
                const isWinner = winners.some(w => w.name === p.name);
                if (!dayData[pName]) dayData[pName] = { wins: 0, total: 0 };
                dayData[pName].total += 1;
                if (isWinner) dayData[pName].wins += 1;
            });

            await dayRef.set(dayData);
            alert(`Match recorded for ${dateKey}!`);
        } catch (e) {
            console.error("Save error:", e);
        }
    };

    // --- OLD DASHBOARD (Deprecated - Use Stats Page Instead) ---
    window.toggleDashboard = function() {
        console.log("Use showStatsPage() instead");
        showStatsPage();
    };

	 // --- 6. BIG TV (大電視) ENGINE ---
	let gameWords = [];
	let filteredWords = [];
	let gameScore = 0;
	let timeLeft = 60;
	let gameInterval;
	let selectedDuration = 60; // Default time

	// 1. SET TIME (Called by buttons t60, t90, t120)
	window.setTime = function(seconds) {
		selectedDuration = seconds;
		// UI Feedback: Reset colors and highlight active
		document.querySelectorAll('.time-opt').forEach(btn => btn.style.background = '#a78bfa');
		const activeBtn = document.getElementById('t' + seconds);
		if(activeBtn) activeBtn.style.background = '#d8b4fe';
	};

	// 2. LOAD WORDS & POPULATE CATEGORIES
	async function loadWords() {
		const originalUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzCZ1TCzstZPFtem7rrT6ZHZM4SXZdeI6r5SJTz32issZ5ZCLiNN9l2PE-MSqVErhyNN0EZxeVud3H/pub?gid=1360810286&single=true&output=csv';
		const csvUrl = 'https://corsproxy.io/?' + encodeURIComponent(originalUrl);

		try {
			const res = await fetch(csvUrl);
			const text = await res.text();
			const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");

			gameWords = lines.slice(1).map(line => {
				const p = line.split(',');
				return { category: p[0]?.trim() || "General", word: p[1]?.trim() || "", translation: p[2]?.trim() || "" };
			}).filter(item => item.word !== "");

			// Build Checklist UI
			const container = document.getElementById('category-items');
			container.innerHTML = "";
			const categories = [...new Set(gameWords.map(item => item.category))].sort();

			categories.forEach(cat => {
				const label = document.createElement('label');
				label.style.display = "block";
				label.innerHTML = `<input type="checkbox" class="cat-check" value="${cat}" checked> ${cat}`;
				container.appendChild(label);
			});
		} catch (e) {
			console.error("Load failed", e);
		}
	}

	// 3. START GAME (Merged version)
	window.startBigTV = async function() {
		if (gameWords.length === 0) await loadWords();
		
		// Get all checked categories
		const selectedCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(cb => cb.value);

		if (selectedCats.length === 0) return alert("Please select at least one category!");

		// Filter words
		filteredWords = gameWords.filter(w => selectedCats.includes(w.category));

		if (filteredWords.length === 0) return alert("No words found in these categories!");

		// UI Switch
		document.getElementById('game-lobby').classList.add('hidden');
		document.getElementById('game-active').classList.remove('hidden');
		
		gameScore = 0;
		timeLeft = selectedDuration;
		document.getElementById('score').innerText = gameScore;
		document.getElementById('timer').innerText = timeLeft;
		
		updateWord();

		if (gameInterval) clearInterval(gameInterval);
		gameInterval = setInterval(() => {
			timeLeft--;
			document.getElementById('timer').innerText = timeLeft;
			if (timeLeft <= 0) endGame();
		}, 1000);
	};

	// 4. UPDATE WORD (Randomly picks from filtered list)
	window.updateWord = function() {
		if (filteredWords.length > 0) {
			const item = filteredWords[Math.floor(Math.random() * filteredWords.length)];
			document.getElementById('word-display').innerHTML = `
				<div class="display-word">${item.word}</div>
				<div class="display-translation">${item.translation || ''}</div>
				<div class="display-category">${item.category || ''}</div>
			`;
		}
	};

	// 5. NEXT WORD (Handles score and effects)
	window.nextWord = function(isCorrect) {
		const display = document.getElementById('word-display');
		if (isCorrect) {
			gameScore++;
			document.getElementById('score').innerText = gameScore;
			display.classList.add('flash-green');
			setTimeout(() => display.classList.remove('flash-green'), 300);
		}
		updateWord();
	};

	// 6. END GAME
	window.endGame = function(manual = false) {
    clearInterval(gameInterval);
    if (manual) {
        if (!confirm("End game early?")) {
            // Restart timer if they cancel
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            return;
        }
    }
    alert("GAME OVER! Final Score: " + gameScore);
    document.getElementById('game-lobby').classList.remove('hidden');
    document.getElementById('game-active').classList.add('hidden');
};
	window.toggleAllCats = function(checked) {
    // Select all checkboxes inside the category-items list
    const checkboxes = document.querySelectorAll('.cat-check');
    checkboxes.forEach(cb => {
        cb.checked = checked;
    });
};

	// Initialize on page load - preload words and show welcome screen
	window.addEventListener('load', () => {
		loadWords().catch(e => console.error("Initial load failed", e));
		document.getElementById('welcome-screen').style.display = 'flex';
	});
 
</script>
</body>
